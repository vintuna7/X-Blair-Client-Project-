<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blair Chromebook System</title>

<style>
/* CSS GOES HERE */
</style>

</head>
<body>

<!-- LOGIN SCREEN -->

<div id="loginScreen" class="card login-card">

  <h1>📦 Blair Chromebook System</h1>

  <p class="subtitle">
    Create an account or sign in
  </p>

  <input
    id="username"
    placeholder="Username"
  >

  <input
    id="password"
    type="password"
    placeholder="Password"
  >

  <div class="login-buttons">

    <button
      class="btn"
      onclick="login()"
    >
      Sign In
    </button>

    <button
      class="btn"
      onclick="createAccount()"
    >
      Create Account
    </button>

  </div>

  <div id="loginMsg" class="msg"></div>

</div>

<!-- MAIN APP -->

<div id="app" class="hidden">

  <div class="card">

    <div class="topbar">

      <h1>
        📦 Blair Chromebook System
      </h1>

      <button
        class="btn"
        onclick="logout()"
      >
        Logout
      </button>

    </div>

    <!-- NAVIGATION -->

    <div class="nav">

      <button
        class="btn"
        onclick="showTab('checkout')"
      >
        Check Out
      </button>

      <button
        class="btn"
        onclick="showTab('checkin')"
      >
        Check In
      </button>

      <button
        class="btn"
        onclick="showTab('report')"
      >
        Report
      </button>

    </div>

    <!-- CHECKOUT TAB -->

    <div
      id="checkout"
      class="tab active"
    >

      <h2>Check Out Chromebook</h2>

      <input
        id="coNum"
        placeholder="Chromebook Number"
      >

      <input
        id="coStudent"
        placeholder="Student ID"
      >

      <button
        class="btn"
        onclick="checkout()"
      >
        Check Out
      </button>

      <div id="coMsg"></div>

    </div>

    <!-- CHECKIN TAB -->

    <div
      id="checkin"
      class="tab"
    >

      <h2>Check In Chromebook</h2>

      <input
        id="ciNum"
        placeholder="Chromebook Number"
      >

      <button
        class="btn"
        onclick="checkin()"
      >
        Check In
      </button>

      <div id="ciMsg"></div>

    </div>

    <!-- REPORT TAB -->

    <div
      id="report"
      class="tab"
    >

      <h2>Report</h2>

      <table>

        <thead>

          <tr>
            <th>Chromebook</th>
            <th>Student</th>
            <th>Status</th>
          </tr>

        </thead>

        <tbody id="reportBody">
        </tbody>

      </table>

    </div>

  </div>

</div>

<script>
// JavaScript goes here
</script>

</body>
</html>
